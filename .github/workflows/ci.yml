name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t weather-dashboard-ci -f Dockerfile .

      - name: Run container
        run: docker run -d --name weather-dashboard-ci -p 3000:3000 --env-file .env.example weather-dashboard-ci

      - name: Smoke test
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:3000 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          docker logs weather-dashboard-ci
          exit 1

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE_REPO=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          IMAGE_BASE="ghcr.io/${IMAGE_REPO}"
          docker tag weather-dashboard-ci "${IMAGE_BASE}:latest"
          docker tag weather-dashboard-ci "${IMAGE_BASE}:${GITHUB_SHA}"
          docker push "${IMAGE_BASE}:latest"
          docker push "${IMAGE_BASE}:${GITHUB_SHA}"

      - name: Cleanup
        if: always()
        run: docker rm -f weather-dashboard-ci || true
